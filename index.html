<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark light" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Pathfinder Quantum Technologies</title>
    <script>
      (function(){
        try{
          var saved = localStorage.getItem("theme");
          var sys = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          var theme = saved || sys || "dark";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        }catch(e){}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/assets/heritage-hero.css" />
  </head>

        </div>

        <div class="heritage-hero__caption">

</html>
