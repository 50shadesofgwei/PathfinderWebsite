<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="dark light" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Pathfinder Quantum Technologies - Team</title>
  <script>
    (function(){
      try{
        var saved = localStorage.getItem("theme");
        var sys = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        var theme = saved || sys || "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      }catch(e){}
    })();
  </script>
  <link rel="stylesheet" href="/assets/theme.css" />
  <link rel="stylesheet" href="/assets/heritage-hero.css" />
</head>
<body class="page-with-backdrop">
  <section class="heritage-page">
    <div id="heritageHero" class="heritage-hero heritage-hero--backdrop" data-mode="backdrop" data-carousel="team" data-static="true" aria-hidden="true">
      <div class="heritage-hero__visual">
        <div class="heritage-hero__slide heritage-hero__slide--a"></div>
        <div class="heritage-hero__slide heritage-hero__slide--b"></div>
        <div class="heritage-hero__tint"></div>
        <div class="heritage-hero__scrim"></div>
      </div>
    </div>
    <script src="/assets/heritage-boot.js"></script>

    <header class="heritage-hero__header">
      <h1>Pathfinder Quantum Technologies</h1>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a><span class="sep">&middot;</span>
        <a href="mission.html">Mission</a><span class="sep">&middot;</span>
        <a href="team.html" aria-current="page"><b>Team</b></a><span class="sep">&middot;</span>
        <a href="news.html">News</a><span class="sep">&middot;</span>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <div class="heritage-page__content">
      <main>
        <section>
          <div class="team-grid">
            <article class="team-card">
              <img class="team-photo" src="/header.jpg" alt="Photo of Jonathan Feasby" />
              <h3 class="team-name">Jonathan Feasby</h3>
              <p class="team-role">Founder</p>
            </article>
          </div>
        </section>
      </main>
    </div>
  </section>

  <script src="/assets/heritage-hero.js"></script>
</body>
</html>
